services:
  - type: web
    name: getotp-server
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_KEY
        sync: false
      - key: WORKER_SECRET
        sync: false
